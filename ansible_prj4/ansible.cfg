[defaults]
inventory = ./inventory.ini
host_key_checking = False
interpreter_python = /home/ubuntu/venvs/ansible-venv/bin/python3
# This disables interpreter discovery and forces the exact path
INTERPRETER_PYTHON_FALLBACK = []
# Prevent warnings about interpreter discovery
deprecation_warnings = False

[ssh_connection]
ssh_args = -F /home/ubuntu/.ssh/config
